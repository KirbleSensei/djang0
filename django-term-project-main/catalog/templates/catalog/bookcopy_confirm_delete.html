{% extends "base.html" %}
{% block title %}Delete copy{% endblock %}
{% block content %}
  <div class="ui-panel card-body col-lg-7">
    <div class="page-kicker">Confirm deletion</div>
    <h1 class="h4 mb-3">Delete copy</h1>
    <p>Remove copy <strong>{{ object.copy_code }}</strong>?</p>
    <form method="post" class="mt-3">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Delete</button>
      <a class="btn btn-outline-secondary" href="{% url 'catalog:book-detail' object.book_id %}">Cancel</a>
    </form>
  </div>
{% endblock %}
